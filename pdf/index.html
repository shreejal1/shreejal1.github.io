<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Page Rearranger</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    
    <style>
        :root {
            --bg-color: #0f172a;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #38bdf8;
            --card-bg: #1e293b;
            --success: #22c55e;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); padding: 2rem; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        .header { text-align: center; margin-bottom: 2rem; width: 100%; max-width: 800px; }
        .header h1 { font-size: 2.5rem; margin-bottom: 0.5rem; color: var(--accent); }
        .header p { color: var(--text-muted); }
        
        .controls { background: var(--card-bg); padding: 1.5rem; border-radius: 8px; border: 1px solid #334155; width: 100%; max-width: 800px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; gap: 1rem; flex-wrap: wrap; }
        .controls-group { display: flex; gap: 1rem; flex-wrap: wrap; }
        
        input[type="file"] { display: none; }
        .btn { background: var(--accent); color: #0f172a; border: none; padding: 0.75rem 1.5rem; border-radius: 6px; font-weight: bold; cursor: pointer; transition: opacity 0.2s; font-size: 1rem; }
        .btn:hover { opacity: 0.9; }
        .btn-outline { background: transparent; color: var(--accent); border: 2px solid var(--accent); }
        .btn-outline:hover { background: rgba(56, 189, 248, 0.1); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .btn-booklet { background: transparent; color: var(--success); border: 2px solid var(--success); }
        .btn-booklet:hover { background: rgba(34, 197, 94, 0.1); }

        #pdf-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 1.5rem; width: 100%; max-width: 1000px; }
        
        .page-wrapper { background: white; border-radius: 4px; padding: 0.5rem; box-shadow: 0 4px 6px rgba(0,0,0,0.3); cursor: grab; position: relative; transition: transform 0.1s; display: flex; flex-direction: column; align-items: center; }
        .page-wrapper:active { cursor: grabbing; transform: scale(1.05); z-index: 10; box-shadow: 0 10px 15px rgba(0,0,0,0.5); }
        .page-wrapper canvas { max-width: 100%; height: auto; border: 1px solid #e2e8f0; pointer-events: none; }
        
        .page-number { position: absolute; bottom: -12px; background: var(--accent); color: #0f172a; width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 0.8rem; border: 2px solid var(--bg-color); }
        
        .sortable-ghost { opacity: 0.4; background-color: var(--accent); }
        .sortable-drag { opacity: 1 !important; }

        #loading { display: none; color: var(--accent); font-weight: bold; margin-top: 1rem; margin-bottom: 1rem;}
    </style>
</head>
<body>

    <div class="header">
        <h1>PDF Rearranger</h1>
        <p>Upload a PDF, reorder pages manually, or automatically sort for 9-page double-sided booklets.</p>
    </div>

    <div class="controls">
        <div class="controls-group">
            <label for="pdf-upload" class="btn btn-outline">
                📄 Choose PDF File
            </label>
            <input type="file" id="pdf-upload" accept="application/pdf" />
            
            <button id="booklet-btn" class="btn btn-booklet" disabled>📖 Auto-Sort for Booklet</button>
        </div>
        
        <button id="download-btn" class="btn" disabled>💾 Download New PDF</button>
    </div>
    
    <div id="loading">Processing... Please wait.</div>
    <div id="pdf-grid"></div>

    <script>
        // Initialize PDF.js worker
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        
        let originalPdfBytes = null;
        const grid = document.getElementById('pdf-grid');
        const uploadInput = document.getElementById('pdf-upload');
        const downloadBtn = document.getElementById('download-btn');
        const bookletBtn = document.getElementById('booklet-btn');
        const loadingText = document.getElementById('loading');

        // Handle File Upload
        uploadInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            loadingText.style.display = 'block';
            grid.innerHTML = '';
            downloadBtn.disabled = true;
            bookletBtn.disabled = true;

            try {
                const arrayBuffer = await file.arrayBuffer();
                originalPdfBytes = arrayBuffer.slice(0); // Deep copy for pdf-lib

                const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const viewport = page.getViewport({ scale: 0.5 }); 
                    
                    const wrapper = document.createElement('div');
                    wrapper.className = 'page-wrapper';
                    wrapper.setAttribute('data-original-index', i - 1); // 0-based index for pdf-lib reference

                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    canvas.height = viewport.height;
                    canvas.width = viewport.width;

                    await page.render({ canvasContext: ctx, viewport: viewport }).promise;

                    const pageNum = document.createElement('div');
                    pageNum.className = 'page-number';
                    pageNum.innerText = i; // Visual page number

                    wrapper.appendChild(canvas);
                    wrapper.appendChild(pageNum);
                    grid.appendChild(wrapper);
                }

                new Sortable(grid, {
                    animation: 150,
                    ghostClass: 'sortable-ghost',
                    dragClass: 'sortable-drag',
                    delay: 0, 
                    delayOnTouchOnly: true, 
                    touchStartThreshold: 3
                });

                downloadBtn.disabled = false;
                bookletBtn.disabled = false;
            } catch (error) {
                console.error("Error loading PDF:", error);
                alert("Could not load the PDF: " + error.message);
            } finally {
                loadingText.style.display = 'none';
            }
        });

        // Handle Booklet Sorting Logic
        bookletBtn.addEventListener('click', () => {
            const wrappers = Array.from(document.querySelectorAll('.page-wrapper'));
            const totalPages = wrappers.length;
            if (totalPages === 0) return;

            const baseSequence = [1, 3, 5, 7, 9, 11, 13, 15, 17, 6, 4, 2, 12, 10, 8, 18, 16, 14];
            const totalBatches = Math.ceil(totalPages / 18);
            let targetSequence = [];

            // Calculate the full target sequence dynamically
            for (let i = 0; i < totalBatches; i++) {
                const batchSequence = baseSequence
                    .map(num => num + (i * 18))
                    .filter(num => num <= totalPages);
                targetSequence = targetSequence.concat(batchSequence);
            }

            // Physically move the HTML elements in the grid to match the calculated sequence
            targetSequence.forEach(pageNum => {
                // targetSequence numbers are 1-based. data-original-index is 0-based.
                const originalIndex = pageNum - 1;
                
                // Find the wrapper that matches this original index
                const elementToMove = wrappers.find(w => parseInt(w.getAttribute('data-original-index')) === originalIndex);
                
                if (elementToMove) {
                    // Appending an existing element moves it to the end of the container automatically
                    grid.appendChild(elementToMove); 
                }
            });
            
            // Give user visual feedback
            bookletBtn.innerText = "✅ Pages Reordered";
            setTimeout(() => {
                bookletBtn.innerText = "📖 Auto-Sort for Booklet";
            }, 2000);
        });

        // Handle PDF Reconstruction and Download
        downloadBtn.addEventListener('click', async () => {
            if (!originalPdfBytes) return;
            
            loadingText.innerText = "Generating new PDF...";
            loadingText.style.display = 'block';
            downloadBtn.disabled = true;
            bookletBtn.disabled = true;

            try {
                const { PDFDocument } = PDFLib;
                
                const pdfDoc = await PDFDocument.load(originalPdfBytes);
                const newPdfDoc = await PDFDocument.create();

                // Get the current visual order from the DOM (whether sorted manually or by the booklet button)
                const currentWrappers = document.querySelectorAll('.page-wrapper');
                const newOrderIndices = Array.from(currentWrappers).map(w => parseInt(w.getAttribute('data-original-index')));

                const copiedPages = await newPdfDoc.copyPages(pdfDoc, newOrderIndices);
                copiedPages.forEach(page => newPdfDoc.addPage(page));

                const pdfBytes = await newPdfDoc.save();
                const blob = new Blob([pdfBytes], { type: 'application/pdf' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = 'booklet_ready_document.pdf';
                link.click();
                
                URL.revokeObjectURL(link.href);
            } catch (error) {
                console.error("Error saving PDF:", error);
                alert("Failed to generate PDF: " + error.message);
            } finally {
                loadingText.style.display = 'none';
                loadingText.innerText = "Processing... Please wait.";
                downloadBtn.disabled = false;
                bookletBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
