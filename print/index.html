<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Printer Sequence Calculator</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #38bdf8;
            --card-bg: #1e293b;
            --success: #22c55e;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); padding: 2rem; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        .header { text-align: center; margin-bottom: 2rem; width: 100%; max-width: 600px; }
        .header h1 { font-size: 2.5rem; margin-bottom: 0.5rem; color: var(--accent); }
        .header p { color: var(--text-muted); }
        
        .controls { background: var(--card-bg); padding: 1.5rem; border-radius: 8px; border: 1px solid #334155; width: 100%; max-width: 600px; display: flex; flex-direction: column; gap: 1rem; margin-bottom: 2rem; }
        
        label { font-weight: bold; color: var(--accent); }
        input[type="number"] { width: 100%; padding: 0.75rem; border-radius: 6px; border: 1px solid #334155; background: var(--bg-color); color: var(--text-main); font-size: 1rem; outline: none; }
        input[type="number"]:focus { border-color: var(--accent); }
        
        .btn { background: var(--accent); color: #0f172a; border: none; padding: 0.75rem 1.5rem; border-radius: 6px; font-weight: bold; cursor: pointer; transition: opacity 0.2s; font-size: 1rem; width: 100%; }
        .btn:hover { opacity: 0.9; }

        #results { width: 100%; max-width: 600px; display: flex; flex-direction: column; gap: 1rem; }
        
        .batch-card { background: var(--card-bg); border: 1px solid #334155; border-radius: 8px; padding: 1.5rem; position: relative; }
        .batch-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; border-bottom: 1px solid #334155; padding-bottom: 0.5rem; }
        .batch-header h3 { color: var(--accent); }
        
        .sequence-box { background: var(--bg-color); padding: 1rem; border-radius: 6px; font-family: monospace; font-size: 1.1rem; word-break: break-all; border: 1px solid #334155; }
        
        .copy-btn { background: transparent; border: 1px solid var(--accent); color: var(--accent); padding: 0.25rem 0.75rem; border-radius: 4px; cursor: pointer; font-size: 0.8rem; transition: all 0.2s; }
        .copy-btn:hover { background: rgba(56, 189, 248, 0.1); }
        .copy-btn.copied { background: var(--success); border-color: var(--success); color: #0f172a; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Print Sequence Calculator</h1>
        <p>Generate precise page ranges for 9-page double-sided booklet printing.</p>
    </div>

    <div class="controls">
        <label for="total-pages">Total Number of Pages:</label>
        <input type="number" id="total-pages" min="1" value="100" placeholder="e.g., 100">
        <button id="calculate-btn" class="btn">Generate Sequences</button>
    </div>

    <div id="results"></div>

    <script>
        const baseSequence = [1, 3, 5, 7, 9, 11, 13, 15, 17, 6, 4, 2, 12, 10, 8, 18, 16, 14];
        const btn = document.getElementById('calculate-btn');
        const input = document.getElementById('total-pages');
        const resultsContainer = document.getElementById('results');

        function generateSequences() {
            const totalPages = parseInt(input.value);
            if (isNaN(totalPages) || totalPages < 1) {
                alert('Please enter a valid number greater than 0.');
                return;
            }

            resultsContainer.innerHTML = '';
            const totalBatches = Math.ceil(totalPages / 18);

            for (let i = 0; i < totalBatches; i++) {
                // Calculate the sequence for this batch
                const batchSequence = baseSequence
                    .map(num => num + (i * 18))
                    .filter(num => num <= totalPages); // Drop numbers higher than total pages

                const sequenceString = batchSequence.join(', ');

                // Build the UI for this batch
                const card = document.createElement('div');
                card.className = 'batch-card';
                
                card.innerHTML = `
                    <div class="batch-header">
                        <h3>Batch ${i + 1} <span style="font-size: 0.8rem; color: var(--text-muted); font-weight: normal;">(Pages ${i * 18 + 1} - ${Math.min((i + 1) * 18, totalPages)})</span></h3>
                        <button class="copy-btn" onclick="copyToClipboard(this, '${sequenceString}')">Copy</button>
                    </div>
                    <div class="sequence-box">${sequenceString}</div>
                `;

                resultsContainer.appendChild(card);
            }
        }

        // Copy functionality
        window.copyToClipboard = function(btnElement, text) {
            navigator.clipboard.writeText(text).then(() => {
                const originalText = btnElement.innerText;
                btnElement.innerText = 'Copied!';
                btnElement.classList.add('copied');
                
                setTimeout(() => {
                    btnElement.innerText = originalText;
                    btnElement.classList.remove('copied');
                }, 2000);
            }).catch(err => {
                console.error('Failed to copy text: ', err);
            });
        };

        // Run on button click
        btn.addEventListener('click', generateSequences);

        // Run on Enter key
        input.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                generateSequences();
            }
        });

        // Run once on load
        generateSequences();
    </script>
</body>
</html>
